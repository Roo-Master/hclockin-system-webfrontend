version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chronos_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hospital_clockin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chronos_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chronos_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chronos_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

networks:
  chronos_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
